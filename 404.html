<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#34D399" />
<title>Page introuvable — CalcInvest</title>
<meta name="robots" content="noindex" />
<link rel="icon" href="/favicon.ico" sizes="any" />
<link rel="icon" type="image/svg+xml" href="/assets/icons/icon-192.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="preload" href="/assets/css/style.css" as="style" />
<link rel="stylesheet" href="/assets/css/style.css" />
<style>
.nf-wrap { min-height: calc(100vh - 120px); display: grid; place-items: center; padding: 40px 20px; }
.nf-card { max-width: 560px; text-align: center; }
.nf-code { font: 700 72px var(--font-mono); color: var(--accent); letter-spacing: -0.04em; margin: 0; }
.nf-title { font-size: 24px; font-weight: 700; color: var(--text); margin: 8px 0 12px; }
.nf-lede { font-size: 15px; color: var(--text-2); line-height: 1.6; margin: 0 0 28px; }
.nf-links { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
@media (max-width: 520px) { .nf-links { grid-template-columns: 1fr; } }
.nf-link { display: flex; align-items: center; gap: 10px; padding: 13px 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); text-decoration: none; font: 500 14px var(--font-sans); transition: var(--t-fast); }
.nf-link:hover { border-color: var(--accent); transform: translateY(-1px); }
.nf-link svg { color: var(--accent); flex-shrink: 0; }
.nf-home { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; padding: 12px 24px; background: var(--accent); color: #0A0F14; border-radius: var(--r); font: 600 14px var(--font-sans); text-decoration: none; transition: var(--t-fast); }
.nf-home:hover { filter: brightness(1.08); }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-left">
    <a href="/" class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 2L22 12L12 22L2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 2L17 12L12 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" opacity="0.5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
      </div>
      <div class="logo-text"><div class="logo-text-main">CalcInvest</div></div>
    </a>
  </div>
  <div class="topbar-right" id="ci-user-zone"></div>
</header>

<main class="nf-wrap">
  <div class="nf-card">
    <p class="nf-code">404</p>
    <h1 class="nf-title">Cette page n'existe pas (ou plus)</h1>
    <p class="nf-lede">L'URL a peut-être changé. Les outils les plus utilisés sont juste en dessous — ou tape <kbd style="font-family:var(--font-mono);font-size:12px;padding:2px 6px;background:var(--bg-2);border:1px solid var(--border);border-radius:4px">Ctrl K</kbd> pour chercher.</p>

    <div class="nf-links">
      <a href="/simulateur-dca" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><path d="M2 12l4-4 3 3 5-6"/></svg>
        Simulateur DCA Bourse
      </a>
      <a href="/simulateur-rendement-locatif" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><path d="M3 14V7l5-4 5 4v7"/></svg>
        Rendement Locatif
      </a>
      <a href="/calculateur-impot-revenu" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M6 6h4M6 9h4"/></svg>
        Calculateur Impôt
      </a>
      <a href="/smart-money" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><path d="M2 12l3-2 3 3 3-5 3 3"/></svg>
        Smart Money Tracker
      </a>
      <a href="/calculateur-fire" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><path d="M8 2c-3 4-4 6-4 8a4 4 0 0 0 8 0c0-2-1-4-4-8z"/></svg>
        Calculateur FIRE
      </a>
      <a href="/blog" class="nf-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" width="16" height="16"><rect x="2" y="3" width="12" height="10" rx="1"/><path d="M5 7h6M5 10h4"/></svg>
        Le Blog
      </a>
    </div>

    <a href="/" class="nf-home">
      ← Retour à l'accueil
    </a>
  </div>
</main>

<script src="/assets/js/common.js"></script>
</body>
</html>
