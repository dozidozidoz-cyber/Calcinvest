<style>
  /* Background subtil v3 pour pages auth */
  body.auth-body {
    background:
      radial-gradient(ellipse 1200px 500px at 80% 20%, rgba(5, 150, 105, 0.08) 0%, transparent 60%),
      radial-gradient(ellipse 800px 500px at 10% 90%, rgba(37, 99, 235, 0.04) 0%, transparent 50%),
      var(--bg);
    background-attachment: fixed;
    position: relative;
  }
  body.auth-body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 25% 30%, rgba(5,150,105,0.04) 1.5px, transparent 2px),
      radial-gradient(circle at 75% 70%, rgba(37,99,235,0.03) 1.5px, transparent 2px);
    background-size: 60px 60px, 80px 80px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }
  .auth-page { position: relative; z-index: 2; }
  .auth-card {
    box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 24px 48px rgba(15,23,42,0.06);
    backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.96);
  }
  .auth-top-nav {
    position: fixed;
    top: 24px; left: 24px;
    z-index: 10;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px 8px 10px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    text-decoration: none;
    box-shadow: var(--shadow-sm);
    transition: var(--t-fast);
  }
  .auth-top-nav:hover { color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow); }
</style>
<script type="application/ld+json">{"@context": "https://schema.org", "@type": "WebPage", "name": "Connexion", "description": "Connectez-vous à votre compte CalcInvest pour accéder à vos simulations sauvegardées et aux analyses avancées.", "url": "https://calcinvest.fr/connexion", "publisher": {"@type": "Organization", "name": "CalcInvest", "url": "https://calcinvest.fr"}}</script>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body class="auth-body">

<a href="/" class="auth-top-nav">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M10 12L6 8l4-4"/></svg>
  Retour à l'accueil
</a>

<div class="auth-page">

  <div class="auth-card reveal">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M12 2L22 12L12 22L2 12Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M12 2L17 12L12 22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" opacity="0.5"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
      </div>
      CalcInvest
    </div>

    <h1 class="auth-title">Bon retour</h1>
    <p class="auth-sub">Connectez-vous à votre compte</p>

    <!-- Alerte reset password -->
    <div id="reset-success" class="auth-success" style="display:none">
      Email de réinitialisation envoyé — vérifiez votre boîte mail.
    </div>

    <!-- Erreur -->
    <div id="auth-error" class="auth-error"></div>

    <!-- Formulaire -->
    <form id="login-form" novalidate>

      <div class="auth-field">
        <label class="auth-label" for="email">Adresse e-mail</label>
        <input type="email" id="email" class="auth-input" placeholder="vous@exemple.fr" autocomplete="email" required />
      </div>

      <div class="auth-field">
        <label class="auth-label" for="password" style="display:flex;justify-content:space-between;align-items:center">
          Mot de passe
          <a href="#" id="forgot-link" style="font-size:11.5px;color:var(--accent);text-transform:none;letter-spacing:0;font-weight:500">Mot de passe oublié ?</a>
        </label>
        <input type="password" id="password" class="auth-input" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit" class="auth-btn" id="submit-btn">
        Se connecter
      </button>

    </form>

    <p class="auth-link">
      Pas encore de compte ? <a href="/inscription">Créer un compte gratuit</a>
    </p>

  </div>

  <div style="margin-top:24px;font-size:12px;color:var(--text-4);text-align:center">
    <a href="/" style="color:var(--text-4)">← Retour à l'accueil</a>
  </div>

</div>

<script src="/assets/js/common.js"></script>
<script src="/assets/js/auth.js"></script>
<script>
(function () {
  'use strict';

  // Redirect si déjà connecté
  if (CI.isLoggedIn && CI.isLoggedIn()) {
    window.location.href = '/';
    return;
  }

  // Afficher message reset si vient de la page reset
  if (new URLSearchParams(location.search).get('reset') === '1') {
    const el = document.getElementById('reset-success');
    if (el) { el.style.display = 'block'; el.classList.add('visible'); }
  }

  const form      = document.getElementById('login-form');
  const emailEl   = document.getElementById('email');
  const passEl    = document.getElementById('password');
  const submitBtn = document.getElementById('submit-btn');
  const errorEl   = document.getElementById('auth-error');
  const forgotEl  = document.getElementById('forgot-link');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }
  function clearError() {
    errorEl.classList.remove('visible');
    emailEl.classList.remove('error');
    passEl.classList.remove('error');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    clearError();

    const email    = emailEl.value.trim();
    const password = passEl.value;

    if (!email || !email.includes('@')) {
      emailEl.classList.add('error');
      return showError('Adresse e-mail invalide.');
    }
    if (!password || password.length < 6) {
      passEl.classList.add('error');
      return showError('Mot de passe trop court (6 caractères minimum).');
    }

    submitBtn.disabled   = true;
    submitBtn.textContent = 'Connexion…';

    try {
      await CI.auth.signIn(email, password);
      // Redirect vers la page d'origine ou accueil
      const next = new URLSearchParams(location.search).get('next') || '/';
      window.location.href = next;
    } catch (err) {
      submitBtn.disabled   = false;
      submitBtn.textContent = 'Se connecter';
      const msg = err.message || '';
      if (msg.includes('Invalid login') || msg.includes('credentials')) {
        showError('Email ou mot de passe incorrect.');
      } else if (msg.includes('Email not confirmed')) {
        showError('Confirmez votre e-mail avant de vous connecter (vérifiez vos spams).');
      } else {
        showError('Erreur de connexion : ' + msg);
      }
    }
  });

  forgotEl.addEventListener('click', async (e) => {
    e.preventDefault();
    clearError();
    const email = emailEl.value.trim();
    if (!email || !email.includes('@')) {
      emailEl.classList.add('error');
      return showError('Entrez votre e-mail pour réinitialiser votre mot de passe.');
    }
    forgotEl.textContent = 'Envoi…';
    try {
      await CI.auth.resetPassword(email);
      document.getElementById('reset-success').style.display = 'block';
      document.getElementById('reset-success').classList.add('visible');
    } catch (err) {
      showError('Impossible d\'envoyer l\'e-mail : ' + (err.message || ''));
    } finally {
      forgotEl.textContent = 'Mot de passe oublié ?';
    }
  });

})();
</script>

</body>
</html>
